# Tokimo app manifest（供主 server 读取，注册 / spawn / 资源代理 / launchpad 展示）
[app]
id          = "video"
display     = "Video"
version     = "0.1.0"
description = "Tokimo Video — 库 / 详情 / 播放 / TMDB 刮削 / Jellyfin 适配"

[runtime]
lifecycle    = "resident"
binary       = "tokimo-app-video"
ui_dist      = "ui/dist"

[ui]
entry        = "assets/index.js"
window_type  = "tokimo-video"
category     = "app"
icon         = "Film"
color        = "#ef4444"
width        = 1280
height       = 800

[[app_settings]]
id                   = "download-engine"
title                = "media.downloads.engineSettings.title"
icon                 = "Settings"
component_section_id = "download-engine"

[[app_settings]]
id                   = "tmdb"
title                = "media.tmdbSettings.title"
icon                 = "Settings"
component_section_id = "tmdb"
